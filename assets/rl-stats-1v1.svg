<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="495"
  height="195"
  viewBox="0 0 495 195"
  role="img"
  aria-label="Rocket League Stats — guxvr"
>
  <title>Rocket League Stats — guxvr</title>

  <defs>
    <!-- Card background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060E18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050B12;stop-opacity:1" />
    </linearGradient>

    <!-- Border gradient (blue → orange) -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8E8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect for MMR value -->
    <filter id="mmr-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path for the card rounded corners -->
    <clipPath id="card-clip">
      <rect x="1" y="1" width="493" height="193" rx="11" ry="11" />
    </clipPath>

    <!-- Rank badge glow -->
    <filter id="badge-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Diagonal line pattern for subtle texture -->
    <pattern id="texture" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#00A8E8" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- ===== BORDER (gradient, 1px) ===== -->
  <rect x="0" y="0" width="495" height="195" rx="12" ry="12"
        fill="url(#border-grad)" />

  <!-- ===== CARD BACKGROUND ===== -->
  <rect x="1" y="1" width="493" height="193" rx="11" ry="11"
        fill="url(#bg-grad)" clip-path="url(#card-clip)" />

  <!-- Subtle texture overlay -->
  <rect x="1" y="1" width="493" height="193" rx="11" ry="11"
        fill="url(#texture)" clip-path="url(#card-clip)" />

  <!-- ===== TOP HEADER BAR ===== -->
  <!-- Thin accent line below header -->
  <rect x="1" y="46" width="493" height="1" fill="#00A8E8" fill-opacity="0.25" />

  <!-- Rocket League Logo Icon (geometric RL-style car/rocket shape) -->
  <!-- Outer circle -->
  <circle cx="28" cy="24" r="14" fill="none" stroke="#00A8E8" stroke-width="1.5" stroke-opacity="0.9"/>
  <!-- Inner rocket/boost shape -->
  <path d="M22 29 L28 13 L34 29 L28 25 Z" fill="#00A8E8" fill-opacity="0.95"/>
  <path d="M22 29 L28 25 L28 29 Z" fill="#FF6B35" fill-opacity="0.9"/>
  <!-- Side wings -->
  <path d="M18 27 L22 22 L22 29 Z" fill="#00A8E8" fill-opacity="0.6"/>
  <path d="M38 27 L34 22 L34 29 Z" fill="#00A8E8" fill-opacity="0.6"/>

  <!-- "ROCKET LEAGUE" label -->
  <text x="48" y="19"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8.5"
        font-weight="700"
        letter-spacing="2.5"
        fill="#00A8E8"
        fill-opacity="0.85">ROCKET LEAGUE</text>

  <!-- Player name -->
  <text x="48" y="35"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="600"
        fill="#FFFFFF"
        fill-opacity="0.95">guxvr</text>

  <!-- Mode label (top right) -->
  <text x="488" y="19"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8.5"
        font-weight="600"
        letter-spacing="1.5"
        fill="#8899AA"
        text-anchor="end">1V1 · RANKED DUEL</text>

  <!-- Last updated (top right, below mode) -->
  <text x="488" y="35"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8"
        fill="#556677"
        text-anchor="end">Updated Jun 10, 2026</text>


  <!-- ===== MAIN CONTENT AREA ===== -->

  <!-- LEFT COLUMN: Rank info -->

  <!-- Rank name -->
  <text x="22" y="70"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="600"
        letter-spacing="1.8"
        fill="#8899AA"
        fill-opacity="0.9">CURRENT RANK</text>

  <!-- Rank badge circle -->
  <circle cx="30" cy="96" r="10"
          fill="#00BCD4"
          fill-opacity="0.18"
          stroke="#00BCD4"
          stroke-width="1.5"
          filter="url(#badge-glow)" />
  <circle cx="30" cy="96" r="5" fill="#00BCD4" fill-opacity="0.9" />

  <!-- Rank name text -->
  <text x="46" y="101"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#FFFFFF"
        fill-opacity="0.97">Platinum II</text>

  <!-- Divider dot -->
  <circle cx="220" cy="47" r="0" fill="none" />

  <!-- RIGHT COLUMN: MMR value -->
  <!-- "MMR" label -->
  <text x="488" y="70"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="600"
        letter-spacing="1.8"
        fill="#8899AA"
        fill-opacity="0.9"
        text-anchor="end">MMR</text>

  <!-- MMR big number -->
  <text x="488" y="103"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="32"
        font-weight="800"
        fill="#00A8E8"
        text-anchor="end"
        filter="url(#mmr-glow)">739</text>


  <!-- ===== CHART AREA ===== -->
  <!-- Thin separator line above chart -->
  <rect x="14" y="115" width="467" height="1" fill="#00A8E8" fill-opacity="0.1" />

  <!-- Embedded sparkline chart (base64 PNG) -->
  <image
    x="14" y="120"
    width="467" height="55"
    href="data:image/png;base64,"
    preserveAspectRatio="none"
  />


  <!-- ===== BOTTOM STATS BAR ===== -->
  <rect x="1" y="178" width="493" height="1" fill="#00A8E8" fill-opacity="0.15" />

  <!-- Peak MMR (left) -->
  <text x="22" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        fill="#556677">PEAK</text>
  <text x="50" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#8899AA">739</text>

  <!-- Separator dot -->
  <circle cx="100" cy="188" r="1.5" fill="#334455"/>

  <!-- Trend (center-left) -->
  <text x="112" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        fill="#556677">30d</text>
  <text x="132" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#8899AA">→ 0</text>

  <!-- Separator dot -->
  <circle cx="185" cy="188" r="1.5" fill="#334455"/>

  <!-- Sessions placeholder (right side) -->
  <text x="197" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        fill="#556677">SESSIONS</text>
  <text x="243" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#8899AA">2</text>

  <!-- Source badge (far right) -->
  <text x="488" y="191"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8"
        fill="#2A3A4A"
        text-anchor="end">tracker.gg</text>

</svg>
