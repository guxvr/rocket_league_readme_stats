<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="495"
  height="195"
  viewBox="0 0 495 195"
  role="img"
  aria-label="Rocket League Stats — guxvr"
>
  <title>Rocket League Stats — guxvr</title>

  <defs>
    <!-- Premium background gradients -->
    <!-- Base dark background -->
    <linearGradient id="bg-grad-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081018;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03070C;stop-opacity:1" />
    </linearGradient>

    <!-- Glowing accent blobs for Glassmorphism depth -->
    <radialGradient id="glow-orange" cx="90%" cy="10%" r="60%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow-blue" cx="10%" cy="90%" r="60%">
      <stop offset="0%" style="stop-color:#00A8E8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#00A8E8;stop-opacity:0" />
    </radialGradient>

    <!-- Glass overlay for frosted glass effect -->
    <linearGradient id="glass-overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.01" />
    </linearGradient>

    <!-- Border gradient (blue → orange) -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8E8;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#00A8E8;stop-opacity:0.3" />
      <stop offset="60%" style="stop-color:#FF6B35;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.8" />
    </linearGradient>

    <!-- Text glows -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Shadow for icons -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <clipPath id="card-clip">
      <rect x="1" y="1" width="493" height="193" rx="14" ry="14" />
    </clipPath>

    <!-- Diagonal line pattern for subtle texture -->
    <pattern id="texture" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M-2,2 l4,-4 M0,8 l8,-8 M6,10 l4,-4" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.02"/>
    </pattern>
  </defs>

  <!-- ===== BORDER ===== -->
  <rect x="0" y="0" width="495" height="195" rx="15" ry="15" fill="url(#border-grad)" />

  <!-- ===== CARD BACKGROUND ===== -->
  <rect x="1" y="1" width="493" height="193" rx="14" ry="14" fill="url(#bg-grad-base)" clip-path="url(#card-clip)" />
  
  <!-- Glowing blobs for depth -->
  <rect x="1" y="1" width="493" height="193" fill="url(#glow-orange)" clip-path="url(#card-clip)" />
  <rect x="1" y="1" width="493" height="193" fill="url(#glow-blue)" clip-path="url(#card-clip)" />

  <!-- Texture and Glass Overlay -->
  <rect x="1" y="1" width="493" height="193" rx="14" ry="14" fill="url(#texture)" clip-path="url(#card-clip)" />
  <rect x="1" y="1" width="493" height="193" rx="14" ry="14" fill="url(#glass-overlay)" clip-path="url(#card-clip)" />

  <!-- Inner subtle stroke at the top for 3D effect -->
  <path d="M 14 2 L 481 2 C 488 2 493 7 493 14" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.5" />

  <!-- ===== TOP HEADER BAR ===== -->
  <!-- Thin accent line below header -->
  <rect x="16" y="48" width="463" height="1" fill="#FFFFFF" fill-opacity="0.08" />

  <!-- Rocket League Logo Sprite Injected as Base64 -->
  <image x="16" y="14" width="24" height="24" href="data:image/png;base64," filter="url(#drop-shadow)" />

  <!-- "ROCKET LEAGUE" label -->
  <text x="48" y="23"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="8.5"
        font-weight="700"
        letter-spacing="2.5"
        fill="#00A8E8"
        fill-opacity="0.9">ROCKET LEAGUE</text>

  <!-- Player name -->
  <text x="48" y="38"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="14"
        font-weight="600"
        fill="#FFFFFF"
        fill-opacity="0.95"
        filter="url(#drop-shadow)">guxvr</text>

  <!-- Mode label (top right) -->
  <text x="479" y="23"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="8.5"
        font-weight="700"
        letter-spacing="1.5"
        fill="#FFFFFF"
        fill-opacity="0.5"
        text-anchor="end">2V2 · RANKED DOUBLES</text>

  <!-- Last updated (top right, below mode) -->
  <text x="479" y="37"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="8"
        fill="#FFFFFF"
        fill-opacity="0.3"
        text-anchor="end">Updated Jun 11, 2026</text>


  <!-- ===== MAIN CONTENT AREA ===== -->

  <!-- LEFT COLUMN: Rank info -->

  <!-- Current Rank Label -->
  <text x="20" y="75"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="9"
        font-weight="700"
        letter-spacing="2"
        fill="#FFFFFF"
        fill-opacity="0.4">CURRENT RANK</text>

  <!-- Rank Sprite Injected as Base64 -->
  <image x="15" y="82" width="45" height="45" href="data:image/png;base64," filter="url(#drop-shadow)" />

  <!-- Rank name text -->
  <text x="68" y="112"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="20"
        font-weight="800"
        fill="#FFFFFF"
        fill-opacity="0.95">Diamond II</text>

  <!-- RIGHT COLUMN: MMR value -->
  <!-- "MMR" label -->
  <text x="479" y="75"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="9"
        font-weight="700"
        letter-spacing="2"
        fill="#FFFFFF"
        fill-opacity="0.4"
        text-anchor="end">MMR</text>

  <!-- MMR big number with Neon Glow -->
  <text x="479" y="114"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="38"
        font-weight="800"
        fill="#00A8E8"
        text-anchor="end"
        filter="url(#neon-glow)">981</text>


  <!-- ===== CHART AREA ===== -->
  <!-- Embedded sparkline chart (base64 PNG) -->
  <!-- Move it slightly down and make it blend in -->
  <g opacity="0.8">
    <image
      x="16" y="125"
      width="463" height="50"
      href="data:image/png;base64,"
      preserveAspectRatio="none"
    />
  </g>

  <!-- ===== BOTTOM STATS BAR ===== -->
  <rect x="16" y="174" width="463" height="1" fill="#FFFFFF" fill-opacity="0.08" />

  <!-- Bottom stats container -->
  <g transform="translate(0, 187)">
    <!-- Peak MMR -->
    <text x="20" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="600"
          fill="#FFFFFF" fill-opacity="0.4">PEAK</text>
    <text x="50" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="700"
          fill="#FFFFFF" fill-opacity="0.8">1012</text>

    <!-- Separator -->
    <circle cx="95" cy="-3" r="2" fill="#FFFFFF" fill-opacity="0.1"/>

    <!-- Trend -->
    <text x="108" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="600"
          fill="#FFFFFF" fill-opacity="0.4">30d</text>
    <text x="130" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="800"
          fill="#F44336">↓ -31</text>

    <!-- Separator -->
    <circle cx="185" cy="-3" r="2" fill="#FFFFFF" fill-opacity="0.1"/>

    <!-- Sessions -->
    <text x="198" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="600"
          fill="#FFFFFF" fill-opacity="0.4">SESSIONS</text>
    <text x="250" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="9"
          font-weight="700"
          fill="#FFFFFF" fill-opacity="0.8">3</text>

    <!-- Source badge (far right) -->
    <text x="479" y="0"
          font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
          font-size="8"
          font-weight="600"
          fill="#FFFFFF" fill-opacity="0.2"
          text-anchor="end">tracker.gg</text>
  </g>

</svg>
