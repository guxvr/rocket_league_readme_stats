name: Update Rocket League Stats

on:
  # Runs every day at 09:00 UTC (06:00 Brasília time)
  schedule:
    - cron: "0 9 * * *"

  # Allows manual triggering from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  update-stats:
    name: Fetch & Generate SVG Stats
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed for git push

    steps:
      # ----------------------------------------------------------------
      # 1. Repository checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Uses Action's standard token (already have push permission
          # via permissions: contents: write above)
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 2. Setup Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ----------------------------------------------------------------
      # 3. Install Python dependencies
      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Install Playwright (fallback layer)
      #    Only installs Chromium to minimize time/space
      # ----------------------------------------------------------------
      - name: Install Playwright Chromium (fallback layer)
        run: playwright install chromium --with-deps

      # ----------------------------------------------------------------
      # 5. Execute main script
      # ----------------------------------------------------------------
      - name: Run stats updater
        env:
          EPIC_DISPLAY_NAME: ${{ secrets.EPIC_DISPLAY_NAME }}
        run: |
          max_retries=10
          retry_delay=30
          attempt=1
          success=false

          while [ $attempt -le $max_retries ]; do
            echo "Attempt $attempt of $max_retries..."
            if xvfb-run python src/main.py; then
              echo "Success on attempt $attempt!"
              success=true
              break
            else
              echo "Failed on attempt $attempt."
              if [ $attempt -lt $max_retries ]; then
                echo " Waiting $retry_delay seconds before next attempt..."
                sleep $retry_delay
              fi
              attempt=$((attempt + 1))
            fi
          done

          if [ "$success" = false ]; then
            echo "All $max_retries attempts failed."
            exit 1
          fi

      # ----------------------------------------------------------------
      # 6. Commit and push if changed
      # ----------------------------------------------------------------
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/ data/

          # Only commits if have staged changes
          if git diff --staged --quiet; then
            echo " No changes detected — nothing to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(stats): update RL stats [${DATE}] [skip ci]"
            git push
            echo " Stats updated and pushed to repository."
          fi
